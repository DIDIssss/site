        <h1>Galeria de Títulos do Flamengo</h1>

        <div class="secao-titulos">
            <h2>Títulos Internacionais</h2>
            <p>
                Mundial Interclubes: 1981<br>
                Libertadores: 1981, 2019, 2022 (invicto), 2025<br>
                Copa Mercosul: 1999<br>
                Copa Ouro: 1996 (invicto)<br>
                Recopa Sul-Americana: 2020<br>
                Derby das Américas: 2025<br>
                Copa Challenger: 2025
            </p>
        </div>

        <div class="secao-titulos">
            <h2>Nacionais e Interestaduais</h2>
            <p>
                Brasileirão (9): 1980, 1982, 1983, 1987, 1992, 2009, 2019, 2020, 2025<br>
                Copa do Brasil: 1990 (invicto), 2006, 2013, 2022, 2024<br>
                Supercopa do Brasil: 2020, 2021, 2025<br>
                Rio-São Paulo: 1940, 1961<br>
                Copa dos Campeões: 2001<br>
                Copa dos Campeões Mundiais: 1997 (invicto)<br>
                Taça dos Campeões Estaduais: 1956<br>
                Taça dos Campeões Brasileiros: 1992<br>
                Torneio do Povo: 1972
            </p>
        </div>

        <div class="secao-titulos">
            <h2>Títulos Estaduais</h2>
            <p>
                Campeonato Carioca (40 títulos)<br>
                Taça Guanabara (25 títulos)<br>
                Taça Rio (10 títulos)<br>
                Taça da Capital: 1991, 1993<br>
                Copa Rio: 1991<br>
                Outros torneios estaduais diversos
            </p>
        </div>

        <div class="secao-titulos">
            <h2>Torneios no Exterior</h2>
            <p>
                Diversos títulos internacionais amistosos entre 1952 e 2019, incluindo Espanha, Japão, Itália, Alemanha
                e Estados Unidos.
            </p>
        </div>

        <div class="secao-titulos">
            <h2>Torneios Internacionais no Brasil</h2>
            <p>
                Torneios no Rio, Morumbi, Goiás e outros estados entre 1954 e 1975.
            </p>
        </div>

        <div class="secao-titulos">
            <h2>Interestaduais</h2>
            <p>
                Diversos torneios entre 1953 e 1997 em vários estados brasileiros.
            </p>
        </div>

        <div class="secao-titulos">
            <h2>Municipais / Estaduais</h2>
            <p>
                Taça Madame Gaby: 1916<br>
                Troféu América Fabril: 1919, 1922
            </p>
        </div>
